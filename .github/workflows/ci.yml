name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    # Skip the automated version-bump commit — the Version workflow already
    # ran typecheck + build for those commits.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
