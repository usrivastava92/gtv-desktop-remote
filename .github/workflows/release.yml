name: Release

# Triggered on every push to main and via workflow_dispatch.
#
# Job 1 (build-macos): runs semantic-release --dry-run to find out if this
#   push warrants a new version. If yes, patches package.json with the next
#   version, builds the macOS DMG, and uploads it as a workflow artifact.
#
# Job 2 (release): runs the real semantic-release, downloads the DMG artifact,
#   and attaches it to the GitHub Release.
#
# GITHUB_TOKEN is provided automatically by GitHub Actions — no secret needed.
#
# The [skip ci] guard stops this workflow re-triggering on the version-bump
# commit that @semantic-release/git pushes back to main.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Job 1: build macOS DMG ────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      next-version: ${{ steps.dry-run.outputs.version }}
      will-release: ${{ steps.dry-run.outputs.will_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Determine next version (dry-run)
        id: dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all tags so semantic-release can find the last release tag.
          # actions/checkout with fetch-depth:0 fetches commits but tags may
          # still be missing on some runners.
          git fetch --tags --quiet

          OUTPUT=$(npx semantic-release --dry-run --no-ci 2>&1)
          echo "$OUTPUT"
          # Match both message variants:
          #   "The next release version is X.Y.Z"
          #   "There is no previous release, the next release version is X.Y.Z"
          VERSION=$(echo "$OUTPUT" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || true)
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
            echo "will_release=true"  >> "$GITHUB_OUTPUT"
          else
            echo "will_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits — skipping DMG build"
          fi

      - name: Patch package.json to next version
        if: steps.dry-run.outputs.will_release == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.dry-run.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Typecheck
        if: steps.dry-run.outputs.will_release == 'true'
        run: npm run typecheck

      - name: Build
        if: steps.dry-run.outputs.will_release == 'true'
        run: npm run build

      - name: Package macOS DMG
        if: steps.dry-run.outputs.will_release == 'true'
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG artifact
        if: steps.dry-run.outputs.will_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── Job 2: semantic-release ───────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: needs.build-macos.outputs.will-release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dmg-artifacts

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
