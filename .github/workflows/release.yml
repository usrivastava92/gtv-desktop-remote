name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Package macOS artifacts for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload manual-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gtv-remote-macos
          path: release/*
          if-no-files-found: error

      - name: Publish tagged release to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac dmg zip --publish always