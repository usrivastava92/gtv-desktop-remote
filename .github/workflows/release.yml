name: Release

# Two jobs in a single workflow triggered on push to main:
#
# Job 1 (build-macos): builds the macOS DMG and uploads it as a workflow
#   artifact so Job 2 can consume it.
#
# Job 2 (release): runs semantic-release on ubuntu. It downloads the DMG
#   artifact and passes it to @semantic-release/github as an asset, so the
#   DMG is attached to the GitHub Release atomically.
#
# Both jobs run in the same workflow trigger — no tag-push re-trigger needed,
# avoiding the GitHub Actions limitation where GITHUB_TOKEN-pushed tags do
# not fire new workflow runs.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: build macOS DMG ────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Package macOS DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── Job 2: semantic-release (creates tag + GitHub Release + attaches DMG) ─
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-macos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dmg-artifacts

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
