name: Release

# Triggered when the Version workflow pushes a vX.Y.Z tag to main.
# Builds the macOS DMG and ZIP, creates a GitHub Release with auto-generated
# release notes, and uploads the artifacts.
#
# Manual workflow_dispatch runs build the artifacts locally for inspection
# without creating a release.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Package macOS artifacts
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gtv-remote-macos
          path: release/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release with DMG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Collect only the DMG artifacts (one per arch on Apple Silicon / Intel)
          DMG_FILES=$(find release -name "*.dmg" | tr '\n' ' ')

          if [ -z "$DMG_FILES" ]; then
            echo "No DMG files found in release/. Aborting."
            exit 1
          fi

          echo "Creating release $TAG with artifacts: $DMG_FILES"

          gh release create "$TAG" \
            --title "GTV Remote v${VERSION}" \
            --generate-notes \
            --verify-tag \
            $DMG_FILES
