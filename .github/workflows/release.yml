name: Release

# Runs on every push to main. semantic-release analyzes commits since the
# last vX.Y.Z tag, determines the semver bump, updates package.json, creates
# a git tag, builds the macOS DMG, and publishes a GitHub Release — all in
# one job. The release commit includes [skip ci] so this workflow does not
# re-trigger itself.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials must be false so the RELEASE_TOKEN (passed via
          # GITHUB_TOKEN env below) is used for git operations instead of the
          # default GITHUB_TOKEN, which cannot push to a branch-protected main.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Package macOS DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
