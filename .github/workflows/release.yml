name: Release

# Triggered when the Version workflow pushes a vX.Y.Z tag to main.
# Builds the macOS DMG and ZIP, creates a GitHub Release with auto-generated
# release notes, and uploads the artifacts.
#
# Manual workflow_dispatch runs build the artifacts locally for inspection
# without creating a release.

on:
  # Triggered when the Version workflow successfully pushes a vX.Y.Z tag.
  # Using workflow_run instead of push:tags because tag pushes made by a PAT
  # or GITHUB_TOKEN do not re-trigger other workflows (GitHub Actions limitation).
  workflow_run:
    workflows: ['Version']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    # For workflow_run: only proceed if Version succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For workflow_run events, check out the commit that Version ran on
          # (the chore(release) commit that carries the vX.Y.Z tag).
          # Falls back to default HEAD for manual workflow_dispatch runs.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Package macOS artifacts
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gtv-remote-macos
          path: release/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release with DMG
        if: github.event_name != 'workflow_dispatch'
        run: |
          # Fetch tags pushed by the Version workflow (PAT-pushed tags aren't
          # available in the checkout context by default).
          git fetch --tags

          TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0)
          VERSION="${TAG#v}"

          # Collect only the DMG artifacts (one per arch on Apple Silicon / Intel)
          DMG_FILES=$(find release -name "*.dmg" | tr '\n' ' ')

          if [ -z "$DMG_FILES" ]; then
            echo "No DMG files found in release/. Aborting."
            exit 1
          fi

          echo "Creating release $TAG with artifacts: $DMG_FILES"

          gh release create "$TAG" \
            --title "GTV Remote v${VERSION}" \
            --generate-notes \
            $DMG_FILES
