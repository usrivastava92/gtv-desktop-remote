name: Version

# Runs on every push to main. Reads the commits since the last vX.Y.Z tag,
# determines the semver bump from conventional commit prefixes, updates
# package.json, commits the change, and pushes a new tag — which in turn
# triggers the Release workflow to build and publish the macOS DMG.
#
# Conventional commit → semver mapping
#   BREAKING CHANGE (footer) or feat! / fix! (breaking bang) → MAJOR
#   feat:  / feat(scope):                                     → MINOR
#   fix: / perf: / refactor: / chore: / docs: / style: /
#   test: / build: / ci:  (and their scoped variants)         → PATCH
#
# Commits that start with "chore(release):" are skipped to avoid loops.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the version-bump commit itself so we don't loop.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so we can find the previous tag.
          fetch-depth: 0
          # A fine-grained PAT (stored as RELEASE_TOKEN) with Contents: write
          # is required to bypass branch protection rules that block
          # GITHUB_TOKEN from pushing directly to main.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # ── Find the most recent semver tag (or fall back to repo root) ──
          PREV_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — treating all commits as new."
            COMMITS=$(git log --format="%s%n%b" HEAD)
          else
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log --format="%s%n%b" "${PREV_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag. Skipping bump."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Classify the highest-impact change ──
          BUMP="patch"   # default

          while IFS= read -r line; do
            # BREAKING CHANGE in commit body/footer
            if echo "$line" | grep -qiE "BREAKING[[:space:]]CHANGE"; then
              BUMP="major"
              break
            fi
            # Breaking bang suffix on type  (e.g.  feat!:  or  fix(scope)!:)
            if echo "$line" | grep -qE "^[a-z]+(\([^)]+\))?!:"; then
              BUMP="major"
              break
            fi
            # feat → minor (if not already major)
            if [ "$BUMP" != "major" ] && echo "$line" | grep -qE "^feat(\([^)]+\))?:"; then
              BUMP="minor"
            fi
          done <<< "$COMMITS"

          echo "Determined bump: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"

          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          # Use Node to update version field in-place, preserving formatting.
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEXT}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and tag new version
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git add package.json
          git commit -m "chore(release): v${NEXT}"
          git tag "v${NEXT}"
          git push origin main --follow-tags
